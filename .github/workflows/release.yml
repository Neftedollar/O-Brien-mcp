name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore tests/O-Brien-mcp.Tests.fsproj

      - name: Unit tests (no DB / Ollama required)
        run: dotnet run --project tests -- --filter "O-Brien-mcp.calculateStrength"

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet trusted publishing OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore O-Brien-mcp.fsproj

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack O-Brien-mcp.fsproj -c Release -o ./nupkg /p:Version="$VERSION"

      - name: Get NuGet trusted publishing token
        id: nuget-token
        run: |
          oidc_token=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            -H "Accept: application/json;api-version=2.0" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" | jq -r '.value')

          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi

          response=$(curl -sS \
            -X POST "https://www.nuget.org/api/v2/trustedpublishing/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${oidc_token}\"}")

          echo "NuGet response: $response"

          token=$(echo "$response" | jq -r '.token // empty')
          if [ -z "$token" ]; then
            echo "::error::Failed to obtain NuGet token. Response: $response"
            exit 1
          fi

          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.nuget-token.outputs.token }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
