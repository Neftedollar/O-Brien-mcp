name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore tests/O-Brien-mcp.Tests.fsproj

      - name: Unit tests (no DB / Ollama required)
        run: dotnet run --project tests -- --filter "O-Brien-mcp.calculateStrength"

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet trusted publishing OIDC
      contents: write   # required for GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore O-Brien-mcp.fsproj

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack O-Brien-mcp.fsproj -c Release -o ./nupkg /p:Version="$VERSION"

      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: Neftedollar

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
