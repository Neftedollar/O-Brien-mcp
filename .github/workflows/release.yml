name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore tests/O-Brien-mcp.Tests.fsproj

      - name: Unit tests (no DB / Ollama required)
        run: dotnet run --project tests -- --filter "O-Brien-mcp.calculateStrength"

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet trusted publishing OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: |
          dotnet nuget remove source local-fsmap || true
          dotnet restore O-Brien-mcp.fsproj

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack O-Brien-mcp.fsproj -c Release -o ./nupkg /p:Version="$VERSION"

      - name: Push to NuGet
        uses: NuGet/publish-action@v1
        with:
          packages-directory: ./nupkg
          skip-duplicate: true
